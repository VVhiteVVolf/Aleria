        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #24221f;
            padding: 20px 40px;
            border-bottom: 4px solid #ffd700;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 38px;
            font-weight: 700;
            color: #ffd700;
            animation: subtleGlow 4s infinite alternate;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,215,0,0.5), 0 0 20px rgba(255,215,0,0.3);
        }

        .menu-toggle {
            font-size: 26px;
            background: none;
            border: none;
            color: #d4c2a0;
            cursor: pointer;
            padding: 10px 20px;
            transition: color 0.3s ease, transform 0.3s ease, text-shadow 0.3s ease;
            text-shadow: 0 0 5px rgba(255,215,0,0.2);
        }

        .menu-toggle:hover {
            color: #ffd700;
            transform: scale(1.08);
            text-shadow: 0 0 10px rgba(255,215,0,0.7), 0 0 20px rgba(255,215,0,0.4);
        }

        /* Sidebars */
        .sidebar {
            position: fixed;
            top: 0;
            width: 320px;
            height: 100%;
            background-color: rgba(36, 34, 31, 0.98);
            padding: 30px 25px;
            box-shadow: 5px 0 20px rgba(0,0,0,0.8), inset -2px 0 10px rgba(255,215,0,0.1);
            overflow-y: auto;
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 999;
            box-sizing: border-box;
            border-right: 2px solid #a37c27;
            border-left: 2px solid #a37c27;
        }
        .sidebar-right {
             border-right: 2px solid #a37c27;
             border-left: 2px solid #a37c27;
        }
        .sidebar-left { left: -320px; border-left: none; }
        .sidebar-left.open { transform: translateX(320px); }
        .sidebar-right { right: -320px; border-right: none; }
        .sidebar-right.open { transform: translateX(-320px); }


        .sidebar h3 {
            font-family: 'Cinzel', serif;
            color: #ffd700;
            margin-top: 25px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 3px solid rgba(255,215,0,0.5);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(255,215,0,0.4);
        }

        .sidebar a {
            display: block;
            margin: 12px 0;
            color: #e0d8c8;
            text-decoration: none;
            font-size: 17px;
            transition: color 0.3s ease, transform 0.3s ease, text-shadow 0.3s ease;
        }

        .sidebar a:hover {
            color: #ffd700;
            transform: translateX(8px);
            text-shadow: 0 0 10px rgba(255,215,0,0.6);
            text-decoration: none;
        }

        .sidebar img.banner {
            max-width: 100%;
            height: auto;
            margin-bottom: 25px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            border: 3px solid #a37c27;
            box-shadow: 0 0 15px rgba(0,0,0,0.7), 0 0 20px rgba(255,215,0,0.2);
            border-radius: 5px;
        }

        .sidebar strong {
            font-family: 'Cinzel', serif;
            color: #ffd700;
            display: block;
            margin-bottom: 20px;
            font-size: 20px;
            text-align: center;
            text-shadow: 0 0 8px rgba(255,215,0,0.4);
            text-transform: uppercase;
        }

        .sidebar hr {
            border: none;
            border-top: 2px dashed rgba(255,215,0,0.3);
            margin: 30px 0;
        }

        .sidebar input[type="text"] {
            width: calc(100% - 20px);
            padding: 12px;
            background: #151515;
            border: 2px solid #a37c27;
            color: #f0e6d2;
            font-family: 'Crimson Pro', serif;
            border-radius: 8px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.6), 0 0 5px rgba(255,215,0,0.1);
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .sidebar input[type="text"]:focus {
            border-color: #ffd700;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8), 0 0 15px rgba(255,215,0,0.6);
        }

        .sidebar input[type="text"]::placeholder {
            color: rgba(240, 230, 210, 0.5);
        }

        /* Menü-Icons (Rechte Sidebar) */
        .menu-icons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu-icons a {
            display: flex;
            align-items: center;
            gap: 18px;
            margin: 10px 0;
            font-size: 18px;
        }

        .menu-icons img {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 6px #ffd700);
            transition: transform 0.2s ease;
        }
        .menu-icons a:hover img {
            transform: scale(1.1);
        }

        /* Hauptinhalt (der Container für den Iframe) */
        main {
            flex-grow: 1;
            padding: 30px;
            margin-left: 0;
            margin-right: 0;
            transition: margin-left 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55), margin-right 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            box-sizing: border-box;
        }

        /* Anpassung des Main-Bereichs, wenn Sidebars geöffnet sind */
        body.sidebar-left-open main { margin-left: 320px; }
        body.sidebar-right-open main { margin-right: 320px; }
        body.sidebar-left-open.sidebar-right-open main {
             margin-left: 320px;
             margin-right: 320px;
        }

        /* Der Iframe selbst */
        #inhalt {
            width: 100%;
            height: calc(100vh - (2 * 30px) - 82px - 50px);
            max-width: 1600px;
            border: 3px solid #a37c27;
            background: #f5f1e6;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), 0 0 40px rgba(255,215,0,0.3), inset 0 0 15px rgba(0,0,0,0.5);
            overflow: hidden;
            transition: box-shadow 0.3s ease;
        }
        #inhalt:hover {
             box-shadow: 0 0 30px rgba(0,0,0,0.9), 0 0 50px rgba(255,215,0,0.5), inset 0 0 20px rgba(0,0,0,0.6);
        }

        /* Footer */
        footer {
            background-color: #24221f;
            color: #d4c2a0;
            text-align: center;
            padding: 15px 30px;
            font-size: 14px;
            border-top: 4px solid #ffd700;
            z-index: 1000;
            box-shadow: 0 -3px 10px rgba(0,0,0,0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex; /* Flexbox für die Buttons */
            justify-content: space-between; /* Abstand zwischen den Elementen */
            align-items: center; /* Vertikale Zentrierung */
            flex-wrap: wrap; /* Umbruch auf kleinen Bildschirmen */
            gap: 10px; /* Abstand zwischen den Elementen bei Umbruch */
        }

        .footer-nav-buttons {
            display: flex;
            gap: 15px; /* Abstand zwischen den Buttons */
        }

        .footer-nav-buttons button {
            background-color: #a37c27; /* Goldener Button-Hintergrund */
            color: #f0e6d2; /* Heller Text */
            border: 2px solid #ffd700; /* Heller Goldrand */
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Crimson Pro', serif;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
            text-shadow: 0 0 3px rgba(0,0,0,0.4);
        }

        .footer-nav-buttons button:hover {
            background-color: #ffd700; /* Hintergrund wird heller Gold */
            color: #24221f; /* Text wird dunkel */
            transform: translateY(-2px); /* Leichter Schwebeeffekt */
            box-shadow: 0 4px 8px rgba(0,0,0,0.5), 0 0 15px rgba(255,215,0,0.6); /* Stärkerer Schatten und Glanz */
            text-shadow: none; /* Textschatten entfernen, wenn hell */
        }

        /* Media Queries für kleinere Bildschirme */
        @media (max-width: 768px) {
            body { border: none; box-shadow: none; }
            header { padding: 10px 15px; }
            .logo { font-size: 26px; }
            .menu-toggle { font-size: 20px; }

            .sidebar {
                width: 100vw;
                left: -100vw;
                right: auto;
                transform: translateX(0) !important;
                box-shadow: none;
                padding: 15px;
                border: none;
            }
            .sidebar-right {
                left: auto;
                right: -100vw;
            }

            .sidebar-left.open { left: 0; }
            .sidebar-right.open { right: 0; }
            
            main { padding: 15px; }

            body.sidebar-left-open main, body.sidebar-right-open main, body.sidebar-left-open.sidebar-right-open main {
                margin-left: 0;
                margin-right: 0;
            }
            
            #inhalt {
                height: calc(100vh - 150px);
                border-radius: 8px;
                box-shadow: 0 0 15px rgba(0,0,0,0.6);
            }

            footer {
                flex-direction: column; /* Buttons untereinander auf kleinen Bildschirmen */
                padding: 10px 15px;
                font-size: 12px;
            }

            .footer-nav-buttons {
                flex-direction: row; /* Immer noch nebeneinander, aber mit Umbruch */
                gap: 10px;
                width: 100%; /* Nehmen volle Breite ein */
                justify-content: center; /* Zentrieren der Buttons */
                margin-top: 10px;
            }

            .footer-nav-buttons button {
                padding: 6px 12px;
                font-size: 13px;
                flex-grow: 1; /* Gleichmäßige Breite der Buttons */
            }
        }
    </style>
    <script>
        function toggleSidebar(side) {
            const sidebar = document.getElementById(`sidebar-${side}`);
            const body = document.body;

            sidebar.classList.toggle('open');
            body.classList.toggle(`sidebar-${side}-open`);

            const otherSide = side === 'left' ? 'right' : 'left';
            const otherSidebar = document.getElementById(`sidebar-${otherSide}`);
            if (otherSidebar.classList.contains('open')) {
                otherSidebar.classList.remove('open');
                body.classList.remove(`sidebar-${otherSide}-open`);
            }
        }

        function ladeSeite(ziel) {
            const iframe = document.getElementById('inhalt');
            iframe.src = ziel;
            // Optional: Beide Sidebars schließen nach Klick
            document.getElementById('sidebar-left').classList.remove('open');
            document.getElementById('sidebar-right').classList.remove('open');
            document.body.classList.remove('sidebar-left-open', 'sidebar-right-open');
        }

        // Neue Funktionen für die Iframe-Navigation
        function goBack() {
            const iframe = document.getElementById('inhalt');
            iframe.contentWindow.history.back();
        }

        function goForward() {
            const iframe = document.getElementById('inhalt');
            iframe.contentWindow.history.forward();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.querySelector('.sidebar-left input[type="text"]');
            searchInput.addEventListener('keyup', (event) => {
                const searchTerm = event.target.value.toLowerCase();
                const allLinks = document.querySelectorAll('.sidebar-left a, .sidebar-right a');
                
                allLinks.forEach(link => {
                    if (link.getAttribute('target') === '_blank') {
                        link.style.display = 'block';
                        return;
                    }
                    
                    if (link.textContent.toLowerCase().includes(searchTerm)) {
                        link.style.display = 'block';
                    } else {
                        link.style.display = 'none';
                    }
                });
            });

            const iframe = document.getElementById('inhalt');
            // Nur laden, wenn der Iframe leer ist oder die URL nur die Basis-Domain anzeigt
            if (iframe.src === '' || iframe.src.endsWith(window.location.host + '/') || iframe.src.endsWith(window.location.host + '/index.html')) { 
                // ladeSeite('bestiarium.html'); // oder eine andere existierende Seite
            }
        });
    </script>
